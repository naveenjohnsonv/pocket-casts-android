name: Build Phone and Wear OS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'  # Required for crashlogging-6.0.7
          cache: 'gradle'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Phone Debug APK
        run: ./gradlew :app:assembleDebugProd --no-daemon -x test
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.caching=false
            -Dorg.gradle.internal.http.connectionTimeout=180000
            -Dorg.gradle.internal.http.socketTimeout=180000
          POCKETCASTS_PRIVATE_BUILD: false
      
      - name: Build Wear OS Debug APK
        run: ./gradlew :wear:assembleDebug --no-daemon -x test
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.caching=false
            -Dorg.gradle.internal.http.connectionTimeout=180000
            -Dorg.gradle.internal.http.socketTimeout=180000
      
      - name: Upload Phone APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-debug-apk
          path: app/build/outputs/apk/debugProd/
      
      - name: Upload Wear OS APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-debug-apk
          path: wear/build/outputs/apk/debug/
